<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sound Spectrum Visualizer</title>
  <script src="https://unpkg.com/qrcode-generator@1.4.4/qrcode.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #111;
      color: #fff;
      min-height: 100vh;
      display: -webkit-flex;
      display: flex;
      -webkit-flex-direction: column;
      flex-direction: column;
      -webkit-align-items: center;
      align-items: center;
      -webkit-justify-content: center;
      justify-content: center;
      overflow: hidden;
    }

    .screen { display: none; text-align: center; }
    .screen.active {
      display: -webkit-flex;
      display: flex;
      -webkit-flex-direction: column;
      flex-direction: column;
      -webkit-align-items: center;
      align-items: center;
      -webkit-justify-content: center;
      justify-content: center;
    }

    #start-screen h1 { font-size: 2rem; margin-bottom: 0.5rem; }
    #start-screen p { color: #999; margin-bottom: 2rem; font-size: 1.1rem; }

    .btn {
      background: #fff;
      color: #111;
      border: none;
      padding: 1rem 2.5rem;
      font-size: 1.1rem;
      border-radius: 50px;
      cursor: pointer;
      margin: 0.5rem;
    }
    .btn-secondary {
      background: transparent;
      color: #fff;
      border: 2px solid #555;
    }

    #pair-screen h2 { font-size: 1.5rem; margin-bottom: 1rem; }
    #pair-screen .subtitle { color: #999; font-size: 1rem; margin-bottom: 0.5rem; }
    #qr-container { background: #fff; padding: 16px; border-radius: 12px; display: inline-block; margin: 1rem 0; }
    #room-code { font-size: 2rem; font-weight: 700; letter-spacing: 0.15em; color: #fff; margin-top: 0.5rem; }
    #pair-status { color: #888; font-size: 0.9rem; margin-top: 0.5rem; }

    #mic-screen h2 { font-size: 1.5rem; margin-bottom: 1rem; }
    #mic-status { font-size: 3rem; margin: 1rem 0; }
    #mic-info { color: #888; font-size: 0.9rem; }
    #mic-db { font-size: 1.2rem; color: #ccc; }

    #visualizer {
      -webkit-flex-direction: column;
      flex-direction: column;
      -webkit-align-items: center;
      align-items: center;
      -webkit-justify-content: center;
      justify-content: center;
      width: 100%;
      height: 100vh;
      position: relative;
    }

    #spectrum-ring {
      width: 320px;
      height: 320px;
      border-radius: 50%;
      display: -webkit-flex;
      display: flex;
      -webkit-align-items: center;
      align-items: center;
      -webkit-justify-content: center;
      justify-content: center;
      position: relative;
      -webkit-transition: transform 0.8s ease, box-shadow 1.2s ease, border-color 1.2s ease;
      transition: transform 0.8s ease, box-shadow 1.2s ease, border-color 1.2s ease;
    }

    #db-display {
      text-align: center;
      z-index: 2;
      position: relative;
      width: 100%;
      height: 5.5rem;
    }

    .emoji-layer {
      font-size: 5rem;
      position: absolute;
      left: 50%;
      top: 0;
      -webkit-transform: translateX(-50%);
      transform: translateX(-50%);
      -webkit-transition: opacity 0.4s ease-in-out, -webkit-transform 0.4s ease-in-out;
      transition: opacity 0.4s ease-in-out, transform 0.4s ease-in-out;
      line-height: 1;
      opacity: 1;
    }

    .emoji-layer.hidden {
      opacity: 0;
      -webkit-transform: translateX(-50%) scale(0.7);
      transform: translateX(-50%) scale(0.7);
    }

    #db-num {
      font-size: 1.2rem;
      font-weight: 400;
      opacity: 0.5;
      display: block;
      position: absolute;
      bottom: -1.5rem;
      width: 100%;
      text-align: center;
    }

    #label {
      margin-top: 1.5rem;
      font-size: 1.4rem;
      font-weight: 500;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      z-index: 2;
      -webkit-transition: color 1s ease;
      transition: color 1s ease;
    }

    #db-chart {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 40%;
      z-index: 1;
    }

    #threshold-ctrl {
      position: absolute;
      top: 16px;
      left: 0;
      width: 100%;
      z-index: 3;
      text-align: center;
      font-size: 0.75rem;
      color: rgba(255,255,255,0.4);
    }
    #threshold-ctrl label { display: block; margin-bottom: 0.2rem; }
    #thresh-slider {
      -webkit-appearance: none;
      appearance: none;
      width: 180px;
      height: 6px;
      background: rgba(255,255,255,0.15);
      border-radius: 3px;
      outline: none;
      padding: 12px 0;
      margin: 0;
      touch-action: none;
    }
    #thresh-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: rgba(255,255,255,0.6);
      cursor: pointer;
    }

    #bg-glow {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 0;
      -webkit-transition: background 1.5s ease;
      transition: background 1.5s ease;
    }

    #visualizer > * { z-index: 1; }

    #peak-db {
      margin-top: 0.5rem;
      font-size: 0.9rem;
      color: #888;
    }

    #voices {
      position: absolute;
      bottom: 42%;
      left: 0;
      width: 100%;
      display: -webkit-flex;
      display: flex;
      -webkit-justify-content: center;
      justify-content: center;
      padding: 0 20px;
      z-index: 2;
    }

    .voice-tag {
      padding: 4px 12px;
      margin: 0 4px;
      border-radius: 20px;
      font-size: 0.8rem;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      white-space: nowrap;
    }
  </style>
</head>
<body>

  <div id="start-screen" class="screen active">
    <h1>Sound Spectrum</h1>
    <p>Visualize the colour of sound around you</p>
    <button class="btn" id="start-btn">Start Listening</button>
    <button class="btn btn-secondary" id="tv-btn"><span id="tv-btn-text">Display on TV</span></button>
    <button class="btn btn-secondary" id="tv-legacy-btn"><span id="tv-legacy-text">Display on TV (Legacy)</span></button>
    <p style="color:#555;font-size:0.75rem;margin-top:0.5rem;">Legacy mode works on older smart TVs (2014+)</p>
  </div>

  <div id="pair-screen" class="screen">
    <h2>Display Mode</h2>
    <p class="subtitle">Scan the QR code with your phone to connect</p>
    <div id="qr-container"></div>
    <div id="room-code">----</div>
    <div id="pair-status">Waiting for phone to connect...</div>
  </div>

  <div id="mic-screen" class="screen">
    <h2>Connected to TV</h2>
    <div id="mic-status">🎙️</div>
    <div id="mic-db">-- dB</div>
    <div id="mic-info">Streaming audio to display</div>
  </div>

  <div id="visualizer" class="screen">
    <div id="bg-glow"></div>
    <div id="spectrum-ring">
      <div id="db-display">
        <span id="emoji-a" class="emoji-layer">🔇</span>
        <span id="emoji-b" class="emoji-layer hidden">🔇</span>
        <span id="db-num">-- dB</span>
      </div>
    </div>
    <div id="label">Waiting...</div>
    <div id="peak-db"></div>
    <div id="threshold-ctrl">
      <label for="thresh-slider">Threshold: <span id="thresh-val">70</span> dB</label>
      <input type="range" id="thresh-slider" min="40" max="100" value="70" step="1">
    </div>
    <div id="voices"></div>
    <canvas id="db-chart"></canvas>
  </div>

  <script>
    // ── ES5-compatible code for old TV browsers ──

    var SPECTRUM = [
      { min: 0,   max: 20,  color: [30, 30, 80],     label: 'Silent' },
      { min: 20,  max: 35,  color: [75, 0, 130],      label: 'Whisper' },
      { min: 35,  max: 50,  color: [0, 80, 200],      label: 'Quiet' },
      { min: 50,  max: 60,  color: [0, 180, 120],     label: 'Moderate' },
      { min: 60,  max: 70,  color: [80, 200, 0],      label: 'Conversation' },
      { min: 70,  max: 80,  color: [255, 220, 0],     label: 'Loud' },
      { min: 80,  max: 90,  color: [255, 140, 0],     label: 'Very Loud' },
      { min: 90,  max: 100, color: [255, 50, 0],      label: 'Dangerous' },
      { min: 100, max: 130, color: [200, 0, 0],       label: 'Extreme!' }
    ];
    var SPIKE_MARGIN = 24;
    var MIN_THRESHOLD = 55;
    var CALIBRATION = 120;
    var AMBIENT_FAST = 0.15;
    var AMBIENT_STEADY = 0.01;

    var labelEl = document.getElementById('label');
    var bgGlow = document.getElementById('bg-glow');
    var spectrumRing = document.getElementById('spectrum-ring');
    var peakDbEl = document.getElementById('peak-db');
    var emojiA = document.getElementById('emoji-a');
    var emojiB = document.getElementById('emoji-b');
    var dbNum = document.getElementById('db-num');

    var peakDb = 0;
    var peakDecayTimer = null;
    var currentEmoji = '🔇';
    var activeLayer = 'a';

    // ── Helpers ──
    function getColorForDb(db) {
      var i, s, next, t, color, idx;
      for (i = SPECTRUM.length - 1; i >= 0; i--) {
        if (db >= SPECTRUM[i].min) {
          s = SPECTRUM[i];
          next = SPECTRUM[i + 1];
          if (!next) return { color: s.color, label: s.label };
          t = Math.min((db - s.min) / (s.max - s.min), 1);
          color = [];
          for (idx = 0; idx < 3; idx++) {
            color.push(Math.round(s.color[idx] + (next.color[idx] - s.color[idx]) * t));
          }
          return { color: color, label: s.label };
        }
      }
      return { color: SPECTRUM[0].color, label: SPECTRUM[0].label };
    }

    function rgbStr(color, alpha) {
      if (alpha === undefined) alpha = 1;
      return 'rgba(' + color[0] + ', ' + color[1] + ', ' + color[2] + ', ' + alpha + ')';
    }

    function showScreen(id) {
      var screens = document.getElementsByClassName('screen');
      for (var i = 0; i < screens.length; i++) {
        screens[i].className = screens[i].className.replace(' active', '').replace('active', '');
      }
      var target = document.getElementById(id);
      target.className = target.className + ' active';
    }

    function generateRoomId() {
      var chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
      var id = '';
      for (var i = 0; i < 5; i++) {
        id += chars.charAt(Math.floor(Math.random() * chars.length));
      }
      return id;
    }

    function getUrlParam(name) {
      var search = window.location.search.substring(1);
      var pairs = search.split('&');
      for (var i = 0; i < pairs.length; i++) {
        var parts = pairs[i].split('=');
        if (decodeURIComponent(parts[0]) === name) {
          return decodeURIComponent(parts[1] || '');
        }
      }
      return null;
    }

    // ── Audio processing ──
    function createAudioProcessor(stream) {
      var AudioCtx = window.AudioContext || window.webkitAudioContext;
      var audioCtx = new AudioCtx();
      var sampleRate = audioCtx.sampleRate || 44100;
      var source = audioCtx.createMediaStreamSource(stream);
      var analyser = audioCtx.createAnalyser();
      analyser.fftSize = 2048; // high res for pitch detection
      analyser.smoothingTimeConstant = 0.8;
      source.connect(analyser);

      var bufferLength = analyser.frequencyBinCount; // 1024 bins
      var dataArray = new Uint8Array(bufferLength);
      var freqArray = new Uint8Array(bufferLength);
      var hzPerBin = sampleRate / analyser.fftSize;

      // Voice pitch ranges in bins
      var voiceLowMin = Math.floor(80 / hzPerBin);   // ~80Hz
      var voiceLowMax = Math.floor(165 / hzPerBin);   // ~165Hz (low/male)
      var voiceMidMax = Math.floor(260 / hzPerBin);   // ~260Hz (mid/female)
      var voiceHighMax = Math.floor(400 / hzPerBin);  // ~400Hz (high/child)

      return function sample() {
        analyser.getByteTimeDomainData(dataArray);
        analyser.getByteFrequencyData(freqArray);

        // RMS for dB
        var sum = 0;
        var val;
        for (var i = 0; i < bufferLength; i++) {
          val = (dataArray[i] - 128) / 128;
          sum += val * val;
        }
        var rms = Math.sqrt(sum / bufferLength);
        var rawDb = Math.max(0, Math.min(130, 20 * Math.log10(rms + 0.0001) + 90));

        var freqBars = [];

        // Pitch detection: find dominant frequency in voice range
        var pitch = 0; // 0 = no voice, 1 = low, 2 = mid, 3 = high
        var peakVal = 0;
        var peakBin = 0;
        for (var k = voiceLowMin; k < voiceHighMax && k < bufferLength; k++) {
          if (freqArray[k] > peakVal) {
            peakVal = freqArray[k];
            peakBin = k;
          }
        }
        // Only classify if there's meaningful energy in voice range
        if (peakVal > 100) {
          if (peakBin < voiceLowMax) {
            pitch = 1; // low voice
          } else if (peakBin < voiceMidMax) {
            pitch = 2; // mid voice
          } else {
            pitch = 3; // high voice
          }
        }

        return { rawDb: rawDb, freqBars: freqBars, pitch: pitch };
      };
    }

    // ── Visualizer renderer ──
    var voicesEl = document.getElementById('voices');
    var AMBIENT_BUF_SIZE = 300;
    var AMBIENT_MAX = 65;

    function createRenderer() {
      var smoothDb = 0;
      var displayDb = 0;

      // Smooth color blending
      var smoothColor = [0, 180, 120]; // start green
      var COLOR_BLEND = 0.06; // how fast color transitions (~1-2s)

      // Percentile-based ambient
      var ambientBuf = [];
      var ambientDb = -1;

      // Shriek detection state
      var shriekCount = 0;
      var shriekCooldown = 0;
      var shriekFrames = 0;   // consecutive frames of high-pitch + loud
      var SHRIEK_CONFIRM = 2; // need 2 consecutive frames to confirm shriek
      var lastState = 'calm';
      var stateHoldFrames = 0;
      var frameCount = 0;
      var lastDisplayUpdate = 0;

      // Line chart state
      var chartHistory = [];
      var CHART_LEN = 150;
      var chartCanvas = document.getElementById('db-chart');
      var chartCtx = chartCanvas ? chartCanvas.getContext('2d') : null;
      var chartSized = false;
      var threshSlider = document.getElementById('thresh-slider');
      var threshValEl = document.getElementById('thresh-val');
      var userThreshold = 70;
      if (threshSlider) {
        threshSlider.oninput = function() {
          userThreshold = parseInt(threshSlider.value, 10);
          threshValEl.textContent = userThreshold;
        };
      }

      return function render(rawDb, freqBars, pitch) {
        frameCount++;

        // Slow smoothing — we don't need fast updates
        if (rawDb > smoothDb) {
          smoothDb += (rawDb - smoothDb) * 0.3;
        } else {
          smoothDb += (rawDb - smoothDb) * 0.02;
        }
        var db = smoothDb;

        // Very slow display number — only drifts gently
        displayDb += (db - displayDb) * 0.03;
        var dbRounded = Math.round(displayDb);

        // Percentile-based ambient
        ambientBuf.push(rawDb);
        if (ambientBuf.length > AMBIENT_BUF_SIZE) ambientBuf.shift();
        if (ambientBuf.length >= 30) {
          var sorted = ambientBuf.slice().sort(function(a, b) { return a - b; });
          ambientDb = Math.min(sorted[Math.floor(sorted.length * 0.15)], AMBIENT_MAX);
        } else if (ambientDb < 0) {
          ambientDb = rawDb;
        }

        var threshold = Math.max(MIN_THRESHOLD, ambientDb + SPIKE_MARGIN);

        // Detect shriek: simply above 70dB
        var isShriek = rawDb > userThreshold;
        if (shriekCooldown > 0) shriekCooldown--;

        if (isShriek && shriekCooldown === 0) {
          shriekCount++;
          shriekCooldown = 180; // ~3 seconds before counting again
        }

        // Determine state with hold timer for stability
        var newState;
        if (isShriek || (lastState === 'shriek' && stateHoldFrames > 0)) {
          newState = 'shriek';
        } else if (rawDb > threshold) {
          newState = 'loud';
        } else {
          newState = 'calm';
        }

        if (newState !== lastState) {
          // Hold shriek state for 90 frames (~1.5s) so it doesn't flicker
          if (lastState === 'shriek' && stateHoldFrames > 0) {
            newState = 'shriek'; // keep holding
          } else {
            lastState = newState;
            stateHoldFrames = (newState === 'shriek') ? 90 : 0;
          }
        }
        if (stateHoldFrames > 0) stateHoldFrames--;

        // Map state to display
        var emoji, statusLabel, targetColor;
        if (lastState === 'shriek') {
          emoji = '🙉'; statusLabel = 'High Pitched!';
          targetColor = [255, 30, 0];
        } else if (lastState === 'loud') {
          emoji = '😳'; statusLabel = 'Loud';
          targetColor = [255, 180, 0];
        } else {
          emoji = '😌'; statusLabel = 'All Good';
          targetColor = [0, 180, 120];
        }

        // Blend color smoothly towards target (fast attack for shriek, slow release)
        var blend = (lastState === 'shriek') ? 0.3 : COLOR_BLEND;
        smoothColor[0] += (targetColor[0] - smoothColor[0]) * blend;
        smoothColor[1] += (targetColor[1] - smoothColor[1]) * blend;
        smoothColor[2] += (targetColor[2] - smoothColor[2]) * blend;
        var color = [Math.round(smoothColor[0]), Math.round(smoothColor[1]), Math.round(smoothColor[2])];

        // Only update DOM every 15 frames (~4fps) unless state changes
        var stateChanged = (emoji !== currentEmoji);
        var shouldUpdate = stateChanged || (frameCount - lastDisplayUpdate > 15);

        if (shouldUpdate) {
          lastDisplayUpdate = frameCount;

          if (stateChanged) {
            currentEmoji = emoji;
            if (activeLayer === 'a') {
              emojiB.textContent = emoji;
              emojiB.className = 'emoji-layer';
              emojiA.className = 'emoji-layer hidden';
              activeLayer = 'b';
            } else {
              emojiA.textContent = emoji;
              emojiA.className = 'emoji-layer';
              emojiB.className = 'emoji-layer hidden';
              activeLayer = 'a';
            }
          }

          dbNum.textContent = dbRounded + ' dB';
          labelEl.textContent = '';

          peakDbEl.textContent = Math.round(ambientDb) + ' dB ambient \u00B7 Threshold: ' + Math.round(threshold) + ' dB';

          var intensity = Math.min(db / 100, 1);
          var ringScale = 1 + intensity * 0.1;
          spectrumRing.style.webkitTransform = 'scale(' + ringScale + ')';
          spectrumRing.style.transform = 'scale(' + ringScale + ')';
          spectrumRing.style.boxShadow =
            '0 0 ' + (40 + intensity * 60) + 'px ' + rgbStr(color, 0.2 + intensity * 0.2) + ', ' +
            '0 0 ' + (80 + intensity * 80) + 'px ' + rgbStr(color, 0.05 + intensity * 0.1) + ', ' +
            'inset 0 0 ' + (20 + intensity * 30) + 'px ' + rgbStr(color, 0.05 + intensity * 0.1);
          spectrumRing.style.border = '2px solid ' + rgbStr(color, 0.3 + intensity * 0.3);
          bgGlow.style.background = 'radial-gradient(ellipse at center, ' + rgbStr(color, 0.05 + intensity * 0.08) + ' 0%, transparent 70%)';
        }

        // ── dB line chart ──
        if (frameCount % 2 === 0) {
          chartHistory.push(rawDb);
          if (chartHistory.length > CHART_LEN) chartHistory.shift();
        }

        if (chartCtx && chartHistory.length > 1 && frameCount % 2 === 0) {
          var cw = chartCanvas.offsetWidth;
          var ch = chartCanvas.offsetHeight;
          if (!chartSized || chartCanvas.width !== cw || chartCanvas.height !== ch) {
            chartCanvas.width = cw;
            chartCanvas.height = ch;
            chartSized = true;
          }
          var W = chartCanvas.width;
          var H = chartCanvas.height;
          var pX = 20, pY = 8;
          var dW = W - pX * 2;
          var dH = H - pY * 2;
          var dbLo = 25, dbHi = 95, dbR = dbHi - dbLo;
          var tDb = userThreshold;
          var cLen = chartHistory.length;
          var cStep = dW / (CHART_LEN - 1);
          var bX = pX + dW - (cLen - 1) * cStep;

          chartCtx.clearRect(0, 0, W, H);

          // Left-hand dB scale
          chartCtx.font = '9px sans-serif';
          chartCtx.fillStyle = 'rgba(255,255,255,0.25)';
          chartCtx.textAlign = 'left';
          chartCtx.textBaseline = 'middle';
          var scaleVals = [30, 50, 70, 90];
          for (var si = 0; si < scaleVals.length; si++) {
            var sVal = scaleVals[si];
            var sY = pY + dH * (1 - (sVal - dbLo) / dbR);
            chartCtx.fillText(sVal + '', 2, sY);
          }

          // Threshold line
          var tY = pY + dH * (1 - (tDb - dbLo) / dbR);
          chartCtx.strokeStyle = 'rgba(255, 80, 80, 0.15)';
          chartCtx.lineWidth = 1;
          chartCtx.beginPath();
          chartCtx.moveTo(pX, tY);
          chartCtx.lineTo(pX + dW, tY);
          chartCtx.stroke();

          // Helper to get y for a dB value
          var ci, cx0, cy0, cdb;

          // Fill above-threshold spikes with subtle red
          chartCtx.fillStyle = 'rgba(255, 40, 40, 0.1)';
          for (ci = 1; ci < cLen; ci++) {
            var cdb0 = chartHistory[ci - 1];
            var cdb1 = chartHistory[ci];
            if (cdb1 > tDb || cdb0 > tDb) {
              var fx0 = bX + (ci - 1) * cStep;
              var fx1 = bX + ci * cStep;
              var fy0 = pY + dH * (1 - (Math.max(dbLo, Math.min(dbHi, cdb0)) - dbLo) / dbR);
              var fy1 = pY + dH * (1 - (Math.max(dbLo, Math.min(dbHi, cdb1)) - dbLo) / dbR);
              chartCtx.beginPath();
              chartCtx.moveTo(fx0, Math.min(fy0, tY));
              chartCtx.lineTo(fx1, Math.min(fy1, tY));
              chartCtx.lineTo(fx1, tY);
              chartCtx.lineTo(fx0, tY);
              chartCtx.closePath();
              chartCtx.fill();
            }
          }

          // Base line (teal, faint)
          chartCtx.beginPath();
          chartCtx.strokeStyle = 'rgba(0, 200, 140, 0.3)';
          chartCtx.lineWidth = 1.5;
          chartCtx.lineJoin = 'round';
          chartCtx.lineCap = 'round';
          for (ci = 0; ci < cLen; ci++) {
            cx0 = bX + ci * cStep;
            cy0 = pY + dH * (1 - (Math.max(dbLo, Math.min(dbHi, chartHistory[ci])) - dbLo) / dbR);
            if (ci === 0) chartCtx.moveTo(cx0, cy0);
            else chartCtx.lineTo(cx0, cy0);
          }
          chartCtx.stroke();

          // Red overlay for above-threshold segments
          chartCtx.strokeStyle = 'rgba(255, 60, 60, 0.85)';
          chartCtx.lineWidth = 2;
          var inSpike = false;
          for (ci = 0; ci < cLen; ci++) {
            cdb = chartHistory[ci];
            cx0 = bX + ci * cStep;
            cy0 = pY + dH * (1 - (Math.max(dbLo, Math.min(dbHi, cdb)) - dbLo) / dbR);
            if (cdb > tDb) {
              if (!inSpike) {
                chartCtx.beginPath();
                if (ci > 0) {
                  var px = bX + (ci - 1) * cStep;
                  var py = pY + dH * (1 - (Math.max(dbLo, Math.min(dbHi, chartHistory[ci - 1])) - dbLo) / dbR);
                  chartCtx.moveTo(px, py);
                }
                inSpike = true;
              }
              chartCtx.lineTo(cx0, cy0);
            } else if (inSpike) {
              chartCtx.lineTo(cx0, cy0);
              chartCtx.stroke();
              inSpike = false;
            }
          }
          if (inSpike) chartCtx.stroke();

          // Glowing laser point at the right end
          var lx = bX + (cLen - 1) * cStep;
          var ldb = chartHistory[cLen - 1];
          var ly = pY + dH * (1 - (Math.max(dbLo, Math.min(dbHi, ldb)) - dbLo) / dbR);
          var isAbove = ldb > tDb;
          var gR = isAbove ? 255 : 0;
          var gG = isAbove ? 60 : 220;
          var gB = isAbove ? 60 : 150;

          // Outer glow
          chartCtx.save();
          chartCtx.shadowColor = 'rgba(' + gR + ',' + gG + ',' + gB + ',0.9)';
          chartCtx.shadowBlur = 20;
          chartCtx.fillStyle = 'rgba(' + gR + ',' + gG + ',' + gB + ',0.6)';
          chartCtx.beginPath();
          chartCtx.arc(lx, ly, 3.5, 0, Math.PI * 2);
          chartCtx.fill();
          chartCtx.fill();
          chartCtx.restore();

          // Bright center
          chartCtx.fillStyle = 'rgba(' + gR + ',' + gG + ',' + gB + ',1)';
          chartCtx.beginPath();
          chartCtx.arc(lx, ly, 2, 0, Math.PI * 2);
          chartCtx.fill();
        }
      };
    }

    // ── Mode 1: Local mic ──
    var startBtn = document.getElementById('start-btn');
    function startLocalMic() {
      getMic(function(stream) {
        showScreen('visualizer');
        var sample = createAudioProcessor(stream);
        var render = createRenderer();
        function loop() {
          var data = sample();
          render(data.rawDb, data.freqBars, data.pitch);
          requestAnimationFrame(loop);
        }
        loop();
      }, function(err) {
        alert('Microphone access is required.\n\n' + err.message);
      });
    }
    startBtn.onclick = startLocalMic;
    startBtn.ontouchend = function(e) { e.preventDefault(); startLocalMic(); };

    // ── Shared: hover countdown for TV buttons ──
    function setupHover(btn, textEl, label, onTrigger) {
      var timer = null;
      var interval = null;
      btn.style.minWidth = btn.offsetWidth + 'px';
      btn.onmouseenter = function() {
        var seconds = 5;
        textEl.textContent = seconds + '...';
        interval = setInterval(function() {
          seconds--;
          if (seconds > 0) textEl.textContent = seconds + '...';
        }, 1000);
        timer = setTimeout(function() {
          clearInterval(interval);
          onTrigger();
        }, 5000);
      };
      btn.onmouseleave = function() {
        clearTimeout(timer);
        clearInterval(interval);
        textEl.textContent = label;
      };
    }

    // ── Shared: show QR + room code on pair screen ──
    function showPairScreen(roomId, micUrlSuffix) {
      showScreen('pair-screen');
      document.getElementById('room-code').textContent = roomId;
      var baseUrl = window.location.href.split('?')[0];
      var micUrl = baseUrl + micUrlSuffix;
      var qr = qrcode(0, 'M');
      qr.addData(micUrl);
      qr.make();
      document.getElementById('qr-container').innerHTML = qr.createSvgTag(6, 0);
    }

    // ── Shared: getUserMedia helper ──
    function getMic(cb, errCb) {
      if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
        navigator.mediaDevices.getUserMedia({ audio: true }).then(cb, errCb);
      } else {
        var gum = navigator.getUserMedia || navigator.webkitGetUserMedia || navigator.mozGetUserMedia;
        if (!gum) { errCb(new Error('getUserMedia not supported')); return; }
        gum.call(navigator, { audio: true }, cb, errCb);
      }
    }

    // ── Shared: phone mic UI loop ──
    function runMicUI(sample, micDbEl, statusEl) {
      var data = sample();
      micDbEl.textContent = Math.round(data.rawDb) + ' dB';
      if (data.rawDb > 80) {
        statusEl.textContent = '🤯';
      } else if (data.rawDb > 60) {
        statusEl.textContent = '🎙️';
      } else {
        statusEl.textContent = '😴';
      }
      return data;
    }

    // ================================================================
    // MODE 2A: Modern TV Display (PeerJS / WebRTC)
    // ================================================================
    var tvBtn = document.getElementById('tv-btn');
    var tvBtnText = document.getElementById('tv-btn-text');

    function startTvModern() {
      var roomId = generateRoomId();
      showPairScreen(roomId, '?room=' + roomId + '&transport=peer');
      document.getElementById('pair-status').textContent = 'Loading PeerJS...';

      // Dynamically load PeerJS only when needed
      var script = document.createElement('script');
      script.src = 'https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js';
      script.onload = function() {
        var peerId = 'soundspectrum-' + roomId;
        var peer = new Peer(peerId);
        var render = createRenderer();

        peer.on('open', function() {
          document.getElementById('pair-status').textContent = 'Waiting for phone to connect...';
        });

        peer.on('connection', function(conn) {
          document.getElementById('pair-status').textContent = 'Phone connected!';
          setTimeout(function() { showScreen('visualizer'); }, 500);

          conn.on('data', function(data) {
            render(data.rawDb, data.freqBars, data.pitch || 0);
          });

          conn.on('close', function() {
            showScreen('pair-screen');
            document.getElementById('pair-status').textContent = 'Phone disconnected. Waiting for reconnect...';
          });
        });

        peer.on('error', function(err) {
          document.getElementById('pair-status').textContent = 'Connection error: ' + err.type + '. Refresh to retry.';
        });
      };
      script.onerror = function() {
        document.getElementById('pair-status').textContent = 'Failed to load PeerJS. Try Legacy mode.';
      };
      document.head.appendChild(script);
    }

    setupHover(tvBtn, tvBtnText, 'Display on TV', startTvModern);
    tvBtn.onclick = startTvModern;

    // Phone mic mode for modern (PeerJS)
    function startMicModern(roomId) {
      showScreen('mic-screen');
      var statusEl = document.getElementById('mic-status');
      var infoEl = document.getElementById('mic-info');
      var micDbEl = document.getElementById('mic-db');

      getMic(function(stream) {
        var sample = createAudioProcessor(stream);
        statusEl.textContent = '🔄';
        infoEl.textContent = 'Loading PeerJS...';

        var script = document.createElement('script');
        script.src = 'https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js';
        script.onload = function() {
          infoEl.textContent = 'Connecting to display...';
          var peer = new Peer();
          peer.on('open', function() {
            var peerId = 'soundspectrum-' + roomId;
            var conn = peer.connect(peerId, { reliable: true });

            conn.on('open', function() {
              statusEl.textContent = '🎙️';
              infoEl.textContent = 'Streaming audio to display';

              function sendLoop() {
                var data = runMicUI(sample, micDbEl, statusEl);
                conn.send({ rawDb: data.rawDb, freqBars: data.freqBars, pitch: data.pitch });
                setTimeout(sendLoop, 50);
              }
              sendLoop();
            });

            conn.on('close', function() {
              statusEl.textContent = '❌';
              infoEl.textContent = 'Disconnected. Refresh to reconnect.';
            });
          });

          peer.on('error', function(err) {
            statusEl.textContent = '❌';
            infoEl.textContent = 'Connection failed: ' + err.type + '. Refresh to retry.';
          });
        };
        script.onerror = function() {
          statusEl.textContent = '❌';
          infoEl.textContent = 'Failed to load PeerJS.';
        };
        document.head.appendChild(script);
      }, function(err) {
        statusEl.textContent = '❌';
        infoEl.textContent = 'Microphone access required: ' + err.message;
      });
    }

    // ================================================================
    // MODE 2B: Legacy TV Display (ntfy.sh HTTP relay)
    // ================================================================
    var NTFY_BASE = 'https://ntfy.sh/sndspctm-';
    var tvLegacyBtn = document.getElementById('tv-legacy-btn');
    var tvLegacyText = document.getElementById('tv-legacy-text');

    function startTvLegacy() {
      var roomId = generateRoomId();
      var topic = NTFY_BASE + roomId;
      showPairScreen(roomId, '?room=' + roomId + '&transport=legacy');

      var render = createRenderer();
      var connected = false;

      function handleMessage(msg) {
        try {
          var data = JSON.parse(msg);
          if (!connected) {
            connected = true;
            document.getElementById('pair-status').textContent = 'Phone connected!';
            setTimeout(function() { showScreen('visualizer'); }, 500);
          }
          render(data.r, data.f, data.p || 0);
        } catch (e) {}
      }

      if (typeof EventSource !== 'undefined') {
        var es = new EventSource(topic + '/sse');
        es.onopen = function() {
          document.getElementById('pair-status').textContent = 'Waiting for phone to connect...';
        };
        es.onmessage = function(e) {
          try {
            var outer = JSON.parse(e.data);
            if (outer.message) handleMessage(outer.message);
          } catch (ex) {}
        };
        es.onerror = function() {
          es.close();
          startPolling(topic, handleMessage);
        };
      } else {
        startPolling(topic, handleMessage);
      }
    }

    function startPolling(topic, handleMessage) {
      document.getElementById('pair-status').textContent = 'Waiting for phone to connect...';
      var since = 'all';
      setInterval(function() {
        var xhr = new XMLHttpRequest();
        xhr.open('GET', topic + '/json?poll=1&since=' + since, true);
        xhr.onreadystatechange = function() {
          if (xhr.readyState === 4 && xhr.status === 200) {
            since = '2s';
            var lines = xhr.responseText.trim().split('\n');
            var i, msg;
            for (i = 0; i < lines.length; i++) {
              if (!lines[i]) continue;
              try {
                msg = JSON.parse(lines[i]);
                if (msg.message) handleMessage(msg.message);
              } catch (ex) {}
            }
          }
        };
        xhr.send();
      }, 800);
    }

    setupHover(tvLegacyBtn, tvLegacyText, 'Display on TV (Legacy)', startTvLegacy);
    tvLegacyBtn.onclick = startTvLegacy;

    // Phone mic mode for legacy (ntfy.sh)
    function startMicLegacy(roomId) {
      showScreen('mic-screen');
      var statusEl = document.getElementById('mic-status');
      var infoEl = document.getElementById('mic-info');
      var micDbEl = document.getElementById('mic-db');
      var topic = NTFY_BASE + roomId;

      getMic(function(stream) {
        var sample = createAudioProcessor(stream);
        statusEl.textContent = '🎙️';
        infoEl.textContent = 'Streaming audio to display';

        var lastSend = 0;
        var SEND_INTERVAL = 600;

        function sendLoop() {
          var data = runMicUI(sample, micDbEl, statusEl);
          var now = Date.now();

          if (now - lastSend >= SEND_INTERVAL) {
            lastSend = now;
            var payload = JSON.stringify({ r: Math.round(data.rawDb * 10) / 10, f: data.freqBars, p: data.pitch });
            var xhr = new XMLHttpRequest();
            xhr.open('POST', topic, true);
            xhr.setRequestHeader('Content-Type', 'application/json');
            xhr.setRequestHeader('X-Cache', 'no');
            xhr.setRequestHeader('X-Firebase', 'no');
            xhr.send(payload);
          }

          setTimeout(sendLoop, 50);
        }
        sendLoop();
      }, function(err) {
        statusEl.textContent = '❌';
        infoEl.textContent = 'Microphone access required: ' + err.message;
      });
    }

    // ── Auto-detect mode from URL ──
    var roomParam = getUrlParam('room');
    var modeParam = getUrlParam('mode');
    var transportParam = getUrlParam('transport');

    if (roomParam && transportParam === 'legacy') {
      startMicLegacy(roomParam);
    } else if (roomParam) {
      startMicModern(roomParam);
    } else if (modeParam === 'legacy') {
      startTvLegacy();
    } else if (modeParam === 'tv') {
      startTvModern();
    }
  </script>
</body>
</html>
