<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sound Spectrum Visualizer</title>
  <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
  <script src="https://unpkg.com/qrcode-generator@1.4.4/qrcode.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #111;
      color: #fff;
      min-height: 100vh;
      display: -webkit-flex;
      display: flex;
      -webkit-flex-direction: column;
      flex-direction: column;
      -webkit-align-items: center;
      align-items: center;
      -webkit-justify-content: center;
      justify-content: center;
      overflow: hidden;
    }

    .screen { display: none; text-align: center; }
    .screen.active {
      display: -webkit-flex;
      display: flex;
      -webkit-flex-direction: column;
      flex-direction: column;
      -webkit-align-items: center;
      align-items: center;
      -webkit-justify-content: center;
      justify-content: center;
    }

    #start-screen h1 { font-size: 2rem; margin-bottom: 0.5rem; }
    #start-screen p { color: #999; margin-bottom: 2rem; font-size: 1.1rem; }

    .btn {
      background: #fff;
      color: #111;
      border: none;
      padding: 1rem 2.5rem;
      font-size: 1.1rem;
      border-radius: 50px;
      cursor: pointer;
      margin: 0.5rem;
    }
    .btn-secondary {
      background: transparent;
      color: #fff;
      border: 2px solid #555;
    }

    #pair-screen h2 { font-size: 1.5rem; margin-bottom: 1rem; }
    #pair-screen .subtitle { color: #999; font-size: 1rem; margin-bottom: 0.5rem; }
    #qr-container { background: #fff; padding: 16px; border-radius: 12px; display: inline-block; margin: 1rem 0; }
    #room-code { font-size: 2rem; font-weight: 700; letter-spacing: 0.15em; color: #fff; margin-top: 0.5rem; }
    #pair-status { color: #888; font-size: 0.9rem; margin-top: 0.5rem; }

    #mic-screen h2 { font-size: 1.5rem; margin-bottom: 1rem; }
    #mic-status { font-size: 3rem; margin: 1rem 0; }
    #mic-info { color: #888; font-size: 0.9rem; }
    #mic-db { font-size: 1.2rem; color: #ccc; }

    #visualizer {
      -webkit-flex-direction: column;
      flex-direction: column;
      -webkit-align-items: center;
      align-items: center;
      -webkit-justify-content: center;
      justify-content: center;
      width: 100%;
      height: 100vh;
      position: relative;
    }

    #spectrum-ring {
      width: 320px;
      height: 320px;
      border-radius: 50%;
      display: -webkit-flex;
      display: flex;
      -webkit-align-items: center;
      align-items: center;
      -webkit-justify-content: center;
      justify-content: center;
      position: relative;
    }

    #db-display {
      text-align: center;
      z-index: 2;
      position: relative;
      width: 100%;
      height: 5.5rem;
    }

    .emoji-layer {
      font-size: 5rem;
      position: absolute;
      left: 50%;
      top: 0;
      -webkit-transform: translateX(-50%);
      transform: translateX(-50%);
      -webkit-transition: opacity 0.4s ease-in-out, -webkit-transform 0.4s ease-in-out;
      transition: opacity 0.4s ease-in-out, transform 0.4s ease-in-out;
      line-height: 1;
      opacity: 1;
    }

    .emoji-layer.hidden {
      opacity: 0;
      -webkit-transform: translateX(-50%) scale(0.7);
      transform: translateX(-50%) scale(0.7);
    }

    #db-num {
      font-size: 1.2rem;
      font-weight: 400;
      opacity: 0.5;
      display: block;
      position: absolute;
      bottom: -1.5rem;
      width: 100%;
      text-align: center;
    }

    #label {
      margin-top: 1.5rem;
      font-size: 1.4rem;
      font-weight: 500;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      z-index: 2;
    }

    #spectrum-bar {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 120px;
      display: -webkit-flex;
      display: flex;
      -webkit-align-items: flex-end;
      align-items: flex-end;
      -webkit-justify-content: center;
      justify-content: center;
      padding: 0 20px;
      z-index: 1;
    }

    .bar {
      -webkit-flex: 1;
      flex: 1;
      max-width: 12px;
      min-height: 4px;
      border-radius: 4px 4px 0 0;
      margin: 0 1px;
    }

    #scale {
      position: absolute;
      bottom: 130px;
      left: 0;
      width: 100%;
      display: -webkit-flex;
      display: flex;
      -webkit-justify-content: space-between;
      justify-content: space-between;
      padding: 0 20px;
      font-size: 0.7rem;
      color: #666;
    }

    #bg-glow {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 0;
    }

    #visualizer > * { z-index: 1; }

    #peak-db {
      margin-top: 0.5rem;
      font-size: 0.9rem;
      color: #888;
    }
  </style>
</head>
<body>

  <div id="start-screen" class="screen active">
    <h1>Sound Spectrum</h1>
    <p>Visualize the colour of sound around you</p>
    <button class="btn" id="start-btn">Start Listening</button>
    <button class="btn btn-secondary" id="tv-btn"><span id="tv-btn-text">Display on TV</span></button>
  </div>

  <div id="pair-screen" class="screen">
    <h2>Display Mode</h2>
    <p class="subtitle">Scan the QR code with your phone to connect</p>
    <div id="qr-container"></div>
    <div id="room-code">----</div>
    <div id="pair-status">Waiting for phone to connect...</div>
  </div>

  <div id="mic-screen" class="screen">
    <h2>Connected to TV</h2>
    <div id="mic-status">🎙️</div>
    <div id="mic-db">-- dB</div>
    <div id="mic-info">Streaming audio to display</div>
  </div>

  <div id="visualizer" class="screen">
    <div id="bg-glow"></div>
    <div id="spectrum-ring">
      <div id="db-display">
        <span id="emoji-a" class="emoji-layer">🔇</span>
        <span id="emoji-b" class="emoji-layer hidden">🔇</span>
        <span id="db-num">-- dB</span>
      </div>
    </div>
    <div id="label">Waiting...</div>
    <div id="peak-db"></div>
    <div id="spectrum-bar"></div>
    <div id="scale">
      <span>Quiet</span>
      <span>Moderate</span>
      <span>Loud</span>
      <span>Very Loud</span>
    </div>
  </div>

  <script>
    // ── ES5-compatible code for old TV browsers ──

    var SPECTRUM = [
      { min: 0,   max: 20,  color: [30, 30, 80],     label: 'Silent' },
      { min: 20,  max: 35,  color: [75, 0, 130],      label: 'Whisper' },
      { min: 35,  max: 50,  color: [0, 80, 200],      label: 'Quiet' },
      { min: 50,  max: 60,  color: [0, 180, 120],     label: 'Moderate' },
      { min: 60,  max: 70,  color: [80, 200, 0],      label: 'Conversation' },
      { min: 70,  max: 80,  color: [255, 220, 0],     label: 'Loud' },
      { min: 80,  max: 90,  color: [255, 140, 0],     label: 'Very Loud' },
      { min: 90,  max: 100, color: [255, 50, 0],      label: 'Dangerous' },
      { min: 100, max: 130, color: [200, 0, 0],       label: 'Extreme!' }
    ];
    var NUM_BARS = 40;
    var SPIKE_MARGIN = 18;
    var MIN_THRESHOLD = 45;
    var CALIBRATION = 120;
    var AMBIENT_FAST = 0.15;
    var AMBIENT_STEADY = 0.01;

    var labelEl = document.getElementById('label');
    var spectrumBar = document.getElementById('spectrum-bar');
    var bgGlow = document.getElementById('bg-glow');
    var spectrumRing = document.getElementById('spectrum-ring');
    var peakDbEl = document.getElementById('peak-db');
    var emojiA = document.getElementById('emoji-a');
    var emojiB = document.getElementById('emoji-b');
    var dbNum = document.getElementById('db-num');

    var peakDb = 0;
    var peakDecayTimer = null;
    var currentEmoji = '🔇';
    var activeLayer = 'a';

    // Create frequency bars
    var i, bar;
    for (i = 0; i < NUM_BARS; i++) {
      bar = document.createElement('div');
      bar.className = 'bar';
      spectrumBar.appendChild(bar);
    }
    var bars = spectrumBar.getElementsByClassName('bar');

    // ── Helpers ──
    function getColorForDb(db) {
      var i, s, next, t, color, idx;
      for (i = SPECTRUM.length - 1; i >= 0; i--) {
        if (db >= SPECTRUM[i].min) {
          s = SPECTRUM[i];
          next = SPECTRUM[i + 1];
          if (!next) return { color: s.color, label: s.label };
          t = Math.min((db - s.min) / (s.max - s.min), 1);
          color = [];
          for (idx = 0; idx < 3; idx++) {
            color.push(Math.round(s.color[idx] + (next.color[idx] - s.color[idx]) * t));
          }
          return { color: color, label: s.label };
        }
      }
      return { color: SPECTRUM[0].color, label: SPECTRUM[0].label };
    }

    function rgbStr(color, alpha) {
      if (alpha === undefined) alpha = 1;
      return 'rgba(' + color[0] + ', ' + color[1] + ', ' + color[2] + ', ' + alpha + ')';
    }

    function showScreen(id) {
      var screens = document.getElementsByClassName('screen');
      for (var i = 0; i < screens.length; i++) {
        screens[i].className = screens[i].className.replace(' active', '').replace('active', '');
      }
      var target = document.getElementById(id);
      target.className = target.className + ' active';
    }

    function generateRoomId() {
      var chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
      var id = '';
      for (var i = 0; i < 5; i++) {
        id += chars.charAt(Math.floor(Math.random() * chars.length));
      }
      return id;
    }

    function getUrlParam(name) {
      var search = window.location.search.substring(1);
      var pairs = search.split('&');
      for (var i = 0; i < pairs.length; i++) {
        var parts = pairs[i].split('=');
        if (decodeURIComponent(parts[0]) === name) {
          return decodeURIComponent(parts[1] || '');
        }
      }
      return null;
    }

    // ── Audio processing ──
    function createAudioProcessor(stream) {
      var AudioCtx = window.AudioContext || window.webkitAudioContext;
      var audioCtx = new AudioCtx();
      var source = audioCtx.createMediaStreamSource(stream);
      var analyser = audioCtx.createAnalyser();
      analyser.fftSize = 256;
      analyser.smoothingTimeConstant = 0.8;
      source.connect(analyser);

      var bufferLength = analyser.frequencyBinCount;
      var dataArray = new Uint8Array(bufferLength);
      var freqArray = new Uint8Array(bufferLength);

      return function sample() {
        analyser.getByteTimeDomainData(dataArray);
        analyser.getByteFrequencyData(freqArray);

        var sum = 0;
        var val;
        for (var i = 0; i < bufferLength; i++) {
          val = (dataArray[i] - 128) / 128;
          sum += val * val;
        }
        var rms = Math.sqrt(sum / bufferLength);
        var rawDb = Math.max(0, Math.min(130, 20 * Math.log10(rms + 0.0001) + 90));

        var freqBars = [];
        var idx;
        for (var j = 0; j < NUM_BARS; j++) {
          idx = Math.floor((j / NUM_BARS) * bufferLength);
          freqBars.push(freqArray[idx]);
        }
        return { rawDb: rawDb, freqBars: freqBars };
      };
    }

    // ── Visualizer renderer ──
    function createRenderer() {
      var smoothDb = 0;
      var displayDb = 0;
      var ambientDb = -1;
      var ambientFrames = 0;
      var isAlerting = false;

      return function render(rawDb, freqBars) {
        if (rawDb > smoothDb) {
          smoothDb += (rawDb - smoothDb) * 0.6;
        } else {
          smoothDb += (rawDb - smoothDb) * 0.04;
        }
        var db = smoothDb;

        if (rawDb > displayDb + 5) {
          displayDb += (rawDb - displayDb) * 0.35;
        } else {
          displayDb += (db - displayDb) * 0.08;
        }
        var dbRounded = Math.round(displayDb);

        if (dbRounded > peakDb) {
          peakDb = dbRounded;
          clearTimeout(peakDecayTimer);
          peakDecayTimer = setTimeout(function() { peakDb = 0; }, 3000);
        }

        ambientFrames++;
        var adaptRate = ambientFrames < CALIBRATION ? AMBIENT_FAST : AMBIENT_STEADY;
        if (ambientDb < 0) {
          ambientDb = rawDb;
        } else if (rawDb < ambientDb + SPIKE_MARGIN) {
          ambientDb += (rawDb - ambientDb) * adaptRate;
        } else {
          ambientDb += (rawDb - ambientDb) * 0.001;
        }
        var threshold = Math.max(MIN_THRESHOLD, ambientDb + SPIKE_MARGIN);

        isAlerting = rawDb > threshold;

        var headroom = threshold - db;
        var emoji, statusLabel;
        if (isAlerting) {
          emoji = '🤯'; statusLabel = 'Too Loud!';
        } else if (headroom < 4) {
          emoji = '😳'; statusLabel = 'Getting Loud';
        } else if (db < ambientDb + 3) {
          emoji = '😴'; statusLabel = 'Quiet';
        } else {
          emoji = '😊'; statusLabel = 'Normal';
        }

        var color;
        if (isAlerting) {
          color = [255, 30, 0];
        } else {
          color = getColorForDb(db).color;
        }

        peakDbEl.textContent = Math.round(ambientDb) + ' dB ambient \u00B7 Threshold: ' + Math.round(threshold) + ' dB';

        if (emoji !== currentEmoji) {
          currentEmoji = emoji;
          if (activeLayer === 'a') {
            emojiB.textContent = emoji;
            emojiB.className = 'emoji-layer';
            emojiA.className = 'emoji-layer hidden';
            activeLayer = 'b';
          } else {
            emojiA.textContent = emoji;
            emojiA.className = 'emoji-layer';
            emojiB.className = 'emoji-layer hidden';
            activeLayer = 'a';
          }
        }
        dbNum.textContent = dbRounded + ' dB';
        labelEl.textContent = statusLabel;
        labelEl.style.color = rgbStr(color);

        var intensity = Math.min(db / 100, 1);
        var ringScale = 1 + intensity * 0.15;
        spectrumRing.style.webkitTransform = 'scale(' + ringScale + ')';
        spectrumRing.style.transform = 'scale(' + ringScale + ')';
        spectrumRing.style.boxShadow =
          '0 0 ' + (40 + intensity * 80) + 'px ' + rgbStr(color, 0.3 + intensity * 0.3) + ', ' +
          '0 0 ' + (80 + intensity * 120) + 'px ' + rgbStr(color, 0.1 + intensity * 0.2) + ', ' +
          'inset 0 0 ' + (30 + intensity * 40) + 'px ' + rgbStr(color, 0.1 + intensity * 0.15);
        spectrumRing.style.border = '2px solid ' + rgbStr(color, 0.4 + intensity * 0.4);

        bgGlow.style.background = 'radial-gradient(ellipse at center, ' + rgbStr(color, 0.08 + intensity * 0.12) + ' 0%, transparent 70%)';

        var value, barHeight, barColor;
        for (var i = 0; i < NUM_BARS; i++) {
          value = (freqBars[i] || 0) / 255;
          barHeight = Math.max(4, value * 100);
          barColor = getColorForDb(value * 100).color;
          bars[i].style.height = barHeight + 'px';
          bars[i].style.background = rgbStr(barColor, 0.6 + value * 0.4);
        }
      };
    }

    // ── Mode 1: Local mic ──
    document.getElementById('start-btn').onclick = function() {
      var getUserMedia = (navigator.mediaDevices && navigator.mediaDevices.getUserMedia)
        ? function(cb, err) { navigator.mediaDevices.getUserMedia({ audio: true }).then(cb, err); }
        : function(cb, err) {
            var gum = navigator.getUserMedia || navigator.webkitGetUserMedia || navigator.mozGetUserMedia;
            if (!gum) { err(new Error('getUserMedia not supported')); return; }
            gum.call(navigator, { audio: true }, cb, err);
          };

      getUserMedia(function(stream) {
        showScreen('visualizer');
        var sample = createAudioProcessor(stream);
        var render = createRenderer();
        function loop() {
          var data = sample();
          render(data.rawDb, data.freqBars);
          requestAnimationFrame(loop);
        }
        loop();
      }, function(err) {
        alert('Microphone access is required.\n\n' + err.message);
      });
    };

    // ── Mode 2: TV Display ──
    var tvBtn = document.getElementById('tv-btn');
    var tvBtnText = document.getElementById('tv-btn-text');
    var tvBtnLabel = 'Display on TV';
    var hoverTimer = null;
    var countdownInterval = null;

    tvBtn.style.minWidth = tvBtn.offsetWidth + 'px';

    tvBtn.onmouseenter = function() {
      var seconds = 5;
      tvBtnText.textContent = seconds + '...';
      countdownInterval = setInterval(function() {
        seconds--;
        if (seconds > 0) {
          tvBtnText.textContent = seconds + '...';
        }
      }, 1000);
      hoverTimer = setTimeout(function() {
        clearInterval(countdownInterval);
        startTvMode();
      }, 5000);
    };
    tvBtn.onmouseleave = function() {
      clearTimeout(hoverTimer);
      clearInterval(countdownInterval);
      tvBtnText.textContent = tvBtnLabel;
    };

    function startTvMode() {
      var roomId = generateRoomId();
      var peerId = 'soundspectrum-' + roomId;

      showScreen('pair-screen');
      document.getElementById('room-code').textContent = roomId;

      var baseUrl = window.location.href.split('?')[0];
      var micUrl = baseUrl + '?room=' + roomId;
      var qr = qrcode(0, 'M');
      qr.addData(micUrl);
      qr.make();
      document.getElementById('qr-container').innerHTML = qr.createSvgTag(6, 0);

      var peer = new Peer(peerId);
      var render = createRenderer();

      peer.on('open', function() {
        document.getElementById('pair-status').textContent = 'Waiting for phone to connect...';
      });

      peer.on('connection', function(conn) {
        document.getElementById('pair-status').textContent = 'Phone connected!';
        setTimeout(function() { showScreen('visualizer'); }, 500);

        conn.on('data', function(data) {
          render(data.rawDb, data.freqBars);
        });

        conn.on('close', function() {
          showScreen('pair-screen');
          document.getElementById('pair-status').textContent = 'Phone disconnected. Waiting for reconnect...';
        });
      });

      peer.on('error', function(err) {
        document.getElementById('pair-status').textContent = 'Connection error: ' + err.type + '. Refresh to retry.';
      });
    }

    tvBtn.onclick = startTvMode;

    // ── Mode 3: Phone Mic ──
    function startMicMode(roomId) {
      showScreen('mic-screen');
      var statusEl = document.getElementById('mic-status');
      var infoEl = document.getElementById('mic-info');
      var micDbEl = document.getElementById('mic-db');

      var getUserMedia = (navigator.mediaDevices && navigator.mediaDevices.getUserMedia)
        ? function(cb, err) { navigator.mediaDevices.getUserMedia({ audio: true }).then(cb, err); }
        : function(cb, err) {
            var gum = navigator.getUserMedia || navigator.webkitGetUserMedia || navigator.mozGetUserMedia;
            if (!gum) { err(new Error('getUserMedia not supported')); return; }
            gum.call(navigator, { audio: true }, cb, err);
          };

      getUserMedia(function(stream) {
        var sample = createAudioProcessor(stream);

        statusEl.textContent = '🔄';
        infoEl.textContent = 'Connecting to display...';

        var peer = new Peer();
        peer.on('open', function() {
          var peerId = 'soundspectrum-' + roomId;
          var conn = peer.connect(peerId, { reliable: true });

          conn.on('open', function() {
            statusEl.textContent = '🎙️';
            infoEl.textContent = 'Streaming audio to display';

            function sendLoop() {
              var data = sample();
              conn.send(data);
              micDbEl.textContent = Math.round(data.rawDb) + ' dB';

              if (data.rawDb > 80) {
                statusEl.textContent = '🤯';
              } else if (data.rawDb > 60) {
                statusEl.textContent = '🎙️';
              } else {
                statusEl.textContent = '😴';
              }

              setTimeout(sendLoop, 50);
            }
            sendLoop();
          });

          conn.on('close', function() {
            statusEl.textContent = '❌';
            infoEl.textContent = 'Disconnected from display. Refresh to reconnect.';
          });
        });

        peer.on('error', function(err) {
          statusEl.textContent = '❌';
          infoEl.textContent = 'Connection failed: ' + err.type + '. Refresh to retry.';
        });
      }, function(err) {
        statusEl.textContent = '❌';
        infoEl.textContent = 'Microphone access required: ' + err.message;
      });
    }

    // ── Auto-detect mode from URL ──
    var roomParam = getUrlParam('room');
    var modeParam = getUrlParam('mode');
    if (roomParam) {
      startMicMode(roomParam);
    } else if (modeParam === 'tv') {
      startTvMode();
    }
  </script>
</body>
</html>
