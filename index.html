<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sound Spectrum Visualizer</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #111;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    #start-screen {
      text-align: center;
    }

    #start-screen h1 {
      font-size: 2rem;
      margin-bottom: 0.5rem;
    }

    #start-screen p {
      color: #999;
      margin-bottom: 2rem;
      font-size: 1.1rem;
    }

    #start-btn {
      background: #fff;
      color: #111;
      border: none;
      padding: 1rem 2.5rem;
      font-size: 1.2rem;
      border-radius: 50px;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
    }

    #start-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 0 30px rgba(255, 255, 255, 0.3);
    }

    #visualizer {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100vh;
      position: relative;
    }

    #spectrum-ring {
      width: 320px;
      height: 320px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.1s ease-out, box-shadow 0.1s ease-out;
      position: relative;
    }

    #db-display {
      text-align: center;
      z-index: 2;
      position: relative;
      width: 100%;
      height: 5.5rem;
    }

    .emoji-layer {
      font-size: 5rem;
      position: absolute;
      left: 50%;
      top: 0;
      transform: translateX(-50%);
      transition: opacity 0.4s ease-in-out, transform 0.4s ease-in-out;
      line-height: 1;
    }

    .emoji-layer.hidden {
      opacity: 0;
      transform: translateX(-50%) scale(0.7);
    }

    #db-num {
      font-size: 1.2rem;
      font-weight: 400;
      opacity: 0.5;
      display: block;
      margin-top: 0.3rem;
      position: absolute;
      bottom: -1.5rem;
      width: 100%;
      text-align: center;
    }

    #label {
      margin-top: 1.5rem;
      font-size: 1.4rem;
      font-weight: 500;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      z-index: 2;
    }

    #spectrum-bar {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 120px;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      gap: 3px;
      padding: 0 20px;
      z-index: 1;
    }

    .bar {
      flex: 1;
      max-width: 12px;
      min-height: 4px;
      border-radius: 4px 4px 0 0;
      transition: height 0.08s ease-out;
    }

    #scale {
      position: absolute;
      bottom: 130px;
      left: 0;
      width: 100%;
      display: flex;
      justify-content: space-between;
      padding: 0 20px;
      font-size: 0.7rem;
      color: #666;
    }

    #bg-glow {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
      transition: background 0.3s ease-out;
    }

    #visualizer > * {
      z-index: 1;
    }

    #peak-db {
      margin-top: 0.5rem;
      font-size: 0.9rem;
      color: #888;
    }
  </style>
</head>
<body>

  <div id="start-screen">
    <h1>Sound Spectrum</h1>
    <p>Visualize the colour of sound around you</p>
    <button id="start-btn">Start Listening</button>
  </div>

  <div id="visualizer">
    <div id="bg-glow"></div>
    <div id="spectrum-ring">
      <div id="db-display">
        <span id="emoji-a" class="emoji-layer">🔇</span>
        <span id="emoji-b" class="emoji-layer hidden">🔇</span>
        <span id="db-num">-- dB</span>
      </div>
    </div>
    <div id="label">Waiting...</div>
    <div id="peak-db">Peak: -- dB</div>
    <div id="spectrum-bar"></div>
    <div id="scale">
      <span>Quiet</span>
      <span>Moderate</span>
      <span>Loud</span>
      <span>Very Loud</span>
    </div>
  </div>

  <script>
    const SPECTRUM = [
      { min: 0,   max: 20,  color: [30, 30, 80],     label: 'Silent' },
      { min: 20,  max: 35,  color: [75, 0, 130],      label: 'Whisper' },
      { min: 35,  max: 50,  color: [0, 80, 200],      label: 'Quiet' },
      { min: 50,  max: 60,  color: [0, 180, 120],     label: 'Moderate' },
      { min: 60,  max: 70,  color: [80, 200, 0],      label: 'Conversation' },
      { min: 70,  max: 80,  color: [255, 220, 0],     label: 'Loud' },
      { min: 80,  max: 90,  color: [255, 140, 0],     label: 'Very Loud' },
      { min: 90,  max: 100, color: [255, 50, 0],      label: 'Dangerous' },
      { min: 100, max: 130, color: [200, 0, 0],       label: 'Extreme!' },
    ];

    const NUM_BARS = 40;
    const startScreen = document.getElementById('start-screen');
    const visualizer = document.getElementById('visualizer');
    const dbDisplay = document.getElementById('db-display');
    const label = document.getElementById('label');
    const spectrumBar = document.getElementById('spectrum-bar');
    const bgGlow = document.getElementById('bg-glow');
    const spectrumRing = document.getElementById('spectrum-ring');
    const peakDbEl = document.getElementById('peak-db');

    let peakDb = 0;
    let peakDecayTimer = null;

    // Emoji crossfade state
    const emojiA = document.getElementById('emoji-a');
    const emojiB = document.getElementById('emoji-b');
    const dbNum = document.getElementById('db-num');
    let currentEmoji = '🔇';
    let activeLayer = 'a'; // which layer is currently visible

    // Create frequency bars
    for (let i = 0; i < NUM_BARS; i++) {
      const bar = document.createElement('div');
      bar.classList.add('bar');
      spectrumBar.appendChild(bar);
    }
    const bars = document.querySelectorAll('.bar');

    function getColorForDb(db) {
      for (let i = SPECTRUM.length - 1; i >= 0; i--) {
        if (db >= SPECTRUM[i].min) {
          const s = SPECTRUM[i];
          const next = SPECTRUM[i + 1];
          if (!next) return { color: s.color, label: s.label };

          const t = Math.min((db - s.min) / (s.max - s.min), 1);
          const color = s.color.map((c, idx) =>
            Math.round(c + (next.color[idx] - c) * t)
          );
          return { color, label: s.label };
        }
      }
      return { color: SPECTRUM[0].color, label: SPECTRUM[0].label };
    }

    function rgbStr(color, alpha = 1) {
      return `rgba(${color[0]}, ${color[1]}, ${color[2]}, ${alpha})`;
    }

    document.getElementById('start-btn').addEventListener('click', async () => {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        startScreen.style.display = 'none';
        visualizer.style.display = 'flex';
        startVisualizer(stream);
      } catch (err) {
        alert('Microphone access is required.\n\n' + err.message);
      }
    });

    function startVisualizer(stream) {
      const audioCtx = new AudioContext();
      const source = audioCtx.createMediaStreamSource(stream);
      const analyser = audioCtx.createAnalyser();
      analyser.fftSize = 256;
      analyser.smoothingTimeConstant = 0.8;
      source.connect(analyser);

      const bufferLength = analyser.frequencyBinCount;
      const dataArray = new Uint8Array(bufferLength);
      const freqArray = new Uint8Array(bufferLength);

      // Smoothing: fast attack, slow release (visuals)
      let smoothDb = 0;
      const ATTACK = 0.6;
      const RELEASE = 0.04;

      // Extra-heavy smoothing just for the displayed number
      let displayDb = 0;
      const DISPLAY_SMOOTH = 0.08;
      const DISPLAY_SPIKE = 0.35;

      // Adaptive threshold: continuously track ambient noise
      let ambientDb = -1;
      let ambientFrames = 0;
      const AMBIENT_FAST = 0.15;    // initial calibration rate
      const AMBIENT_STEADY = 0.01;  // ongoing tracking rate
      const CALIBRATION = 120;      // ~2s at 60fps before switching to steady
      const SPIKE_MARGIN = 18;      // dB above ambient to trigger alert
      const MIN_THRESHOLD = 45;
      let isAlerting = false;

      function update() {
        analyser.getByteTimeDomainData(dataArray);
        analyser.getByteFrequencyData(freqArray);

        // Calculate RMS for dB
        let sum = 0;
        for (let i = 0; i < bufferLength; i++) {
          const val = (dataArray[i] - 128) / 128;
          sum += val * val;
        }
        const rms = Math.sqrt(sum / bufferLength);

        // Convert to approximate dB (calibrated for typical mic)
        const rawDb = Math.max(0, Math.min(130, 20 * Math.log10(rms + 0.0001) + 90));

        // Apply fast-attack / slow-release envelope
        if (rawDb > smoothDb) {
          smoothDb += (rawDb - smoothDb) * ATTACK;
        } else {
          smoothDb += (rawDb - smoothDb) * RELEASE;
        }
        const db = smoothDb;

        // Separate slower smoothing for the number display
        if (rawDb > displayDb + 5) {
          displayDb += (rawDb - displayDb) * DISPLAY_SPIKE;
        } else {
          displayDb += (db - displayDb) * DISPLAY_SMOOTH;
        }
        const dbRounded = Math.round(displayDb);

        // Track peak
        if (dbRounded > peakDb) {
          peakDb = dbRounded;
          clearTimeout(peakDecayTimer);
          peakDecayTimer = setTimeout(() => { peakDb = 0; }, 3000);
        }
        // Continuously adapt ambient baseline
        ambientFrames++;
        const adaptRate = ambientFrames < CALIBRATION ? AMBIENT_FAST : AMBIENT_STEADY;
        if (ambientDb < 0) {
          ambientDb = rawDb;
        } else if (rawDb < ambientDb + SPIKE_MARGIN) {
          // Track both rises and drops in room noise
          ambientDb += (rawDb - ambientDb) * adaptRate;
        } else {
          // During spikes, still let ambient drift down slowly
          // so it adjusts if the room gets quieter
          ambientDb += (rawDb - ambientDb) * 0.001;
        }
        const threshold = Math.max(MIN_THRESHOLD, ambientDb + SPIKE_MARGIN);

        // Determine alert state
        isAlerting = rawDb > threshold;

        // Choose emoji and label based on relationship to threshold
        const headroom = threshold - db;
        let emoji, statusLabel;
        if (isAlerting) {
          emoji = '🤯'; statusLabel = 'Too Loud!';
        } else if (headroom < 4) {
          emoji = '😳'; statusLabel = 'Getting Loud';
        } else if (db < ambientDb + 3) {
          emoji = '😴'; statusLabel = 'Quiet';
        } else {
          emoji = '😊'; statusLabel = 'Normal';
        }

        // Override color to red when alerting
        let color, dbLabel;
        if (isAlerting) {
          color = [255, 30, 0];
          dbLabel = 'Too Loud!';
        } else {
          const result = getColorForDb(db);
          color = result.color;
          dbLabel = result.label;
        }

        peakDbEl.textContent = `${Math.round(ambientDb)} dB ambient · Threshold: ${Math.round(threshold)} dB`;

        // Update display with crossfade
        if (emoji !== currentEmoji) {
          currentEmoji = emoji;
          if (activeLayer === 'a') {
            emojiB.textContent = emoji;
            emojiB.classList.remove('hidden');
            emojiA.classList.add('hidden');
            activeLayer = 'b';
          } else {
            emojiA.textContent = emoji;
            emojiA.classList.remove('hidden');
            emojiB.classList.add('hidden');
            activeLayer = 'a';
          }
        }
        dbNum.textContent = `${dbRounded} dB`;
        label.textContent = statusLabel;
        label.style.color = rgbStr(color);

        // Ring glow
        const intensity = Math.min(db / 100, 1);
        const ringScale = 1 + intensity * 0.15;
        spectrumRing.style.transform = `scale(${ringScale})`;
        spectrumRing.style.boxShadow = `
          0 0 ${40 + intensity * 80}px ${rgbStr(color, 0.3 + intensity * 0.3)},
          0 0 ${80 + intensity * 120}px ${rgbStr(color, 0.1 + intensity * 0.2)},
          inset 0 0 ${30 + intensity * 40}px ${rgbStr(color, 0.1 + intensity * 0.15)}
        `;
        spectrumRing.style.border = `2px solid ${rgbStr(color, 0.4 + intensity * 0.4)}`;

        // Background glow
        bgGlow.style.background = `radial-gradient(ellipse at center, ${rgbStr(color, 0.08 + intensity * 0.12)} 0%, transparent 70%)`;

        // Frequency bars
        for (let i = 0; i < NUM_BARS; i++) {
          const freqIndex = Math.floor((i / NUM_BARS) * bufferLength);
          const value = freqArray[freqIndex] / 255;
          const barHeight = Math.max(4, value * 100);
          const barColor = getColorForDb(value * 100).color;
          bars[i].style.height = `${barHeight}px`;
          bars[i].style.background = rgbStr(barColor, 0.6 + value * 0.4);
        }

        requestAnimationFrame(update);
      }

      update();
    }
  </script>
</body>
</html>
